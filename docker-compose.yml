services:
  market_service:
    build: ./backend/market_service
    ports:
      - "4701:8001"
    volumes:
      - ./backend/market_service:/app
      - ./nginx/indicadores:/app/config
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  alerts_service:
    build: ./backend/alerts_service
    ports:
      - "8002:8002"
    volumes:
      - ./backend/alerts_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  frontend:
    build: 
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4700:80"
    depends_on:
      - market_service
      - alerts_service

# To use this, you need a Dockerfile in each directory.
